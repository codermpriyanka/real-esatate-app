<section class="bg-[#6153CD] text-white py-16 text-center">
    <h1 class="text-4xl md:text-5xl font-bold mb-4">Contact Us</h1>
    <p class="text-lg opacity-90">We would love to hear from you</p>
  </section>
  <section class="py-16 px-6 md:px-20 bg-gray-50">
    <div class="grid md:grid-cols-2 gap-10">
      <div class="bg-white p-8 rounded-2xl shadow">
        <h2 class="text-2xl font-bold mb-6 text-gray-800">Send Message</h2>
        <form [formGroup]="contactForm" (ngSubmit)="onSubmit()">
          <input type="text" formControlName="name" placeholder="Your Name"class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6153CD]">
          <input type="email" formControlName="email" placeholder="Your Email"class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6153CD]">
          <textarea rows="4"   formControlName="message" placeholder="Your Message"class="w-full border p-3 rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6153CD]"></textarea>
          <button type="submit" class="w-full bg-[#6153CD] text-white py-3 rounded-lg hover:bg-[#6153CD]/80 transition">
            Send Message
          </button>
        </form>
      </div>
      <div class="flex flex-col justify-center space-y-6">
        <div class="flex items-center gap-4">
          <i class="fa-solid fa-location-dot text-2xl text-[#6153CD]"></i>
          <p class="text-gray-700">Pune, India</p>
        </div>
        <div class="flex items-center gap-4">
          <i class="fa-solid fa-envelope text-2xl text-[#6153CD]"></i>
          <p class="text-gray-700">your@email.com</p>
        </div>
        <div class="flex items-center gap-4">
          <i class="fa-solid fa-phone text-2xl text-[#6153CD]"></i>
          <p class="text-gray-700">+91 98765 43210</p>
        </div>
        <div class="flex gap-4 mt-4">
          <i class="fa-brands fa-facebook text-xl cursor-pointer hover:text-[#6153CD]"></i>
          <i class="fa-brands fa-instagram text-xl cursor-pointer hover:text-[#6153CD]"></i>
          <i class="fa-brands fa-linkedin text-xl cursor-pointer hover:text-[#6153CD]"></i>
        </div>
  
      </div>
  
    </div>
  </section>
