<section class="bg-[#6153CD] text-white py-16 text-center m-10">
    <h1 class="text-4xl md:text-5xl font-bold mb-4">My Purchased Property</h1>
  </section> 
 <div class="mt-6 px-2 mb-6 sm:px-4 lg:px-6">
 <app-filter [tableData]="purchases" [columns]="tableColumns" (filteredData) = "properties =$event"> </app-filter>
      <div class="w-full overflow-x-auto rounded-lg shadow px-4 my-4">
<table class="min-w-full border text-center">
    <thead>
      <tr class="bg-gray-300">
        <th class="px-3 py-2 md:px-4 md:py-3 text-left text-sm md:text-base">Sl No</th>
        <th class="px-3 py-2 md:px-4 md:py-3 text-left text-sm md:text-base">Property</th>
        <th class="px-3 py-2 md:px-4 md:py-3 text-left text-sm md:text-base">Price</th>
        <th class="px-3 py-2 md:px-4 md:py-3 text-left text-sm md:text-base">Date</th>
        <th class="px-3 py-2 md:px-4 md:py-3 text-left text-sm md:text-base">Status</th>
      </tr>
    </thead>
  
    <tbody>
      <tr *ngFor="let p of properties; let i = index">
        <td class="border px-3 py-2 md:px-4 md:py-3 text-sm md:text-base">{{i+1}}</td>
        <td class="border px-3 py-2 md:px-4 md:py-3 text-sm md:text-base whitespace-nowrap">{{p.name}}</td>
        <td class="border px-3 py-2 md:px-4 md:py-3 text-sm md:text-base">{{p.price}}</td>
        <td class="border px-3 py-2 md:px-4 md:py-3 text-sm md:text-base whitespace-nowrap">{{formatDate(p.addedOn)}}</td>
        <td class="border px-3 py-2 md:px-4 md:py-3 text-sm md:text-base text-green-600">{{p.propertyBoughtStatus}}</td>
      </tr>
    </tbody>
  </table>
 </div>
 </div>
