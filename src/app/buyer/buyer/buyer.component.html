<section *ngIf="buyerProperty.length ===0" class="bg-[#6153CD] text-white py-16 text-center m-10">
    <h1 class="text-4xl md:text-5xl font-bold mb-4">Buyer Property Dashboard</h1>
    <div class="bg-[#6153CD] text-white font-bold border border-white py-2 rounded-lg mt-2 hover:bg-white hover:text-[#6153CD] hover:border hover:border-[#6153CD] transition disabled:opacity-50 px-2">No Property Available</div>
  </section>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
    <div *ngFor="let buypr of buyerProperty" class="bg-white shadow-lg rounded-xl overflow-hidden hover:shadow-2xl transition my-8 mx-8" [ngClass]="isDarkMode?'bg-gray-800 text-white':'bg-white text-black'">
      <img [src]="'https://real-estate-backend-zdip.onrender.com/uploads/' + buypr.photos" class="w-full h-30 object-cover rounded-t-xl">
      <div class="p-4">
        <h2 class="text-lg font-semibold mb-2">{{buypr.name}}</h2>
        <p class="text-gray-600 text-sm mb-2"> <i class="fas fa-map-marker-alt mr-1"></i>{{buypr.address}}</p>
        <p class="text-indigo-600 font-bold mb-2"> <i class="fas fa-rupee-sign mr-1"></i>{{buypr.price}} </p>
        <p class="text-sm text-gray-500 mb-2"><i class="fas fa-home mr-1"></i>{{buypr.facilities}}</p>
        <p class="text-xs text-gray-400"><i class="fas fa-calendar-alt mr-1"></i>{{formatDate(buypr.addedOn)}}</p>
      </div>
  <div class="p-4">
    <!-- (passing particular propertyid) -->
    <button type="submit" [disabled]="buypr.propertyBoughtStatus== 'bought'"
                class="bg-[#6153CD] text-white py-2 px-2 rounded-lg mt-2 hover:bg-white hover:text-[#6153CD] hover:border hover:border-[#6153CD] transition disabled:opacity-50" (click)="openBuyModal(buypr._id)">
               {{buypr.propertyBoughtStatus== 'bought'?'Purchased':'Click here to Buy'}}
        </button>
  </div>
    </div>
  </div>


<!-- MODAL -->
<div *ngIf="showBuyModal" class="fixed inset-0 bg-black bg-opacity-50 flex justify-center items-center">
<div class="p-6 rounded-xl w-[400px]" [ngClass]="isDarkMode?'bg-gray-800 text-white':'bg-white text-black'">
  <h2 class="text-xl font-bold mb-4">Buy Property</h2>
  <form [formGroup]="buyForm" (ngSubmit)="submitBuy()">
    <input type="text" formControlName="name" placeholder="Full Name"
      class="w-full border p-2 mb-2">
    <div class="text-red-500 text-sm" *ngIf="buyForm.controls.name.touched && buyForm.controls.name.invalid">
      Name is required
    </div>
    <input type="email" formControlName="email" placeholder="Email"
      class="w-full border p-2 mb-2">
    <div class="text-red-500 text-sm" *ngIf="buyForm.controls.email.touched && buyForm.controls.email.invalid">
      Email is required
    </div>
    <input type="text" formControlName="mobile" placeholder="Mobile Number"
      class="w-full border p-2 mb-2">
    <div class="text-red-500 text-sm" *ngIf="buyForm.controls.mobile.touched && buyForm.controls.mobile.invalid">
      Mobile is required
    </div>
    <select formControlName="paymentMethod" class="w-full border p-2 mb-2">
      <option value="">Select Payment Method</option>
      <option>UPI</option>
      <option>Card</option>
      <option>Net Banking</option>
    </select>
    <div class="text-red-500 text-sm" *ngIf="buyForm.controls.paymentMethod.touched && buyForm.controls.paymentMethod.invalid">
      Payment method required
    </div>
    <input type="text" formControlName="transactionId" placeholder="Transaction ID"
      class="w-full border p-2 mb-2">
    <div class="text-red-500 text-sm" *ngIf="buyForm.controls.transactionId.touched && buyForm.controls.transactionId.invalid">Transaction ID required</div>
    <div class="flex justify-between mt-3">
      <button type="button" (click)="closeModal()" class="bg-gray-400 px-3 py-2 rounded">Cancel</button>
      <button type="submit" class="bg-green-600 text-white px-3 py-2 rounded disabled:opacity-50" [disabled]="buyForm.invalid">Confirm Buy</button>
    </div>
  </form>

</div>
</div>
