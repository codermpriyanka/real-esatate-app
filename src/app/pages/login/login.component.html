<div *ngIf="loginVal" class="fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center z-50">

  <div class="bg-white rounded-2xl overflow-hidden shadow-2xl w-[90%] md:w-[800px] grid grid-cols-1 md:grid-cols-2">
    <!-- LEFT IMAGE -->
    <div class="hidden md:block">
      <img src="assets/images/loginimage.jpg" class="h-full w-full object-cover">
    </div>

    <!-- RIGHT FORM -->
    <div class="p-8 flex flex-col justify-center flex relative">
      <i class="fas fa-window-close text-[#6153CD] absolute top-2 right-2 cursor-pointer" (click)="closeLoginModal()"></i>
      <h2 class="text-2xl font-bold mb-6 text-[#6153CD]">
       Login
      </h2>
      <form [formGroup]="authForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-4">
        <div>
          <label class="text-sm font-medium">Email</label>
          <input type="email"
                 formControlName="email"
                 class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6153CD]">
        </div>
        <div>
          <label class="text-sm font-medium">Password</label>
          <input type="password"
                 formControlName="password"
                 class="w-full mt-1 px-4 py-2 border rounded-lg focus:outline-none focus:ring-2 focus:ring-[#6153CD]">
        </div>
    
        <button type="submit"
                class="bg-[#6153CD] text-white py-2 rounded-lg mt-2 hover:bg-white hover:text-[#6153CD] hover:border hover:border-[#6153CD] transition disabled:opacity-50">
          Login
        </button>

      </form>
      <p class="text-sm mt-4 text-center">
         Don't have an account?
        <span class="text-[#6153CD] cursor-pointer font-medium ml-1"
              (click)="openSignupForm()">
        Sign Up
        </span>
      </p>

    </div>

  </div>
</div>
